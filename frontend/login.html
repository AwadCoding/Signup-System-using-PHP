<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══ Primary SEO ══════════════════════════════════════════════ -->
    <title>Login — Signup System</title>
    <meta name="description"        content="Log in to your account on Signup System. Access your profile securely with your email and password." />
    <meta name="robots"             content="noindex, nofollow" />
    <link rel="canonical"           href="https://mahmoudawad.rf.gd/frontend/login.html" />

    <!-- ══ Open Graph (Facebook / WhatsApp / LinkedIn) ═════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Login — Signup System" />
    <meta property="og:description" content="Log in to your account securely." />
    <meta property="og:url"         content="https://mahmoudawad.rf.gd/frontend/login.html" />
    <meta property="og:image"       content="https://mahmoudawad.rf.gd/frontend/images/SEO/login.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height"content="720" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="Signup System" />

    <!-- ══ Twitter Card ════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Login — Signup System" />
    <meta name="twitter:description" content="Log in to your account securely." />
    <meta name="twitter:image"       content="https://mahmoudawad.rf.gd/frontend/images/SEO/login.png" />

    <!-- ══ Favicon ═════════════════════════════════════════════════ -->
    <link rel="icon" type="image/svg+xml" href="images/SEO/logo.svg" />

    <!-- ══ Styles ══════════════════════════════════════════════════ -->
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <main>
      <h1>Login</h1>

      <form id="loginForm" action="../backend/login.php" method="post">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email" required />
          <span class="error-msg" id="error-email"></span>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
          <span class="error-msg" id="error-password"></span>
        </div>

        <button type="submit">Login</button>
        <div class="success-msg" id="success-msg"></div>
      </form>

      <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </main>
    <!-- ده لسه هذاكرو بس انا مطبق وعايز الحك انام عشان اجي السيشن فايق 😁 -->

    <script>
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Clear previous errors
        document.querySelectorAll(".error-msg").forEach((el) => (el.textContent = ""));
        document.getElementById("success-msg").textContent = "";

        const formData = new FormData(form);

        try {
          const res = await fetch("../backend/login.php", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          if (data.success) {
            document.getElementById("success-msg").textContent = data.message || "Login successful!";
            // Redirect after short delay
            setTimeout(() => {
              window.location.href = data.redirect || "dashboard.html";
            }, 1000);
          } else {
            for (const [field, msg] of Object.entries(data.errors || {})) {
              const el = document.getElementById("error-" + field);
              if (el) el.innerHTML = msg;
            }
          }
        } catch (err) {
          document.getElementById("success-msg").style.color = "#ff8080";
          document.getElementById("success-msg").textContent = "Connection error. Please try again.";
        }
      });
    </script>
  </body>
</html>
